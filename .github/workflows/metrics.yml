name: Metrics Embed
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Terminal Statboard
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.terminal.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SuperaNova 
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Manila
          
          # Plugins for widgets
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_limit: 10
          plugin_languages_ignored: jupyter notebook, assembly, html, css, kotlin, tsx
          
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          
          plugin_achievements: yes
          plugin_achievements_display: compact

          # Earth-tone styling
          extras_css: |
            :root {
              --color-calendar-graph-day-bg: #3c3836;
              --color-calendar-graph-day-L1-bg: #b57614;
              --color-calendar-graph-day-L2-bg: #d79921;
              --color-calendar-graph-day-L3-bg: #fabd2f;
              --color-calendar-graph-day-L4-bg: #fe8019;
            }
            .terminal {
              color: #ebdbb2;
            }
            h1, h2, h3, .stat { color: #d79921; }
