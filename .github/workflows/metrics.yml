name: Metrics Embed
on:
  schedule: [{cron: "0 0 1 * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Overview — profile header + recent activity (commits, PRs, issues)
      - name: Overview panel
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.overview.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SuperaNova
          template: classic
          base: header, activity
          config_timezone: Asia/Manila
          extras_css: &earth |
            :root {
              --color-calendar-graph-day-bg: #3c3836;
              --color-calendar-graph-day-L1-bg: #b57614;
              --color-calendar-graph-day-L2-bg: #d79921;
              --color-calendar-graph-day-L3-bg: #fabd2f;
              --color-calendar-graph-day-L4-bg: #fe8019;
            }
            body { background: #282828; }
            svg { color: #d5c4a1; }
            h2 { color: #fabd2f !important; }
            a, .blue { color: #fe8019 !important; }

      # 2. Languages — most-used languages breakdown
      - name: Languages panel
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SuperaNova
          template: classic
          base: ""
          config_timezone: Asia/Manila
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: jupyter notebook, assembly, html, css, kotlin, tsx
          extras_css: *earth

      # 3. Commit calendar — isometric full-year commit history
      - name: Calendar panel
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.calendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SuperaNova
          template: classic
          base: ""
          config_timezone: Asia/Manila
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          extras_css: *earth

      # 4. Repositories — pinned/featured repos + community (following, sponsoring)
      - name: Repositories panel
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.repos.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SuperaNova
          template: classic
          base: repositories, community
          config_timezone: Asia/Manila
          extras_css: *earth
