name: Metrics Embed
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Base Stats
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.base.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SuperaNova 
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Manila

      - name: Generate Language Stats
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: SuperaNova 
          template: classic
          base: "" 
          config_timezone: Asia/Manila
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_limit: 10
          plugin_languages_ignored: jupyter notebook, assembly, html, css
          repositories_affiliations: owner, collaborator, organization_member
          commits_authoring: Jared Acebes, jared.acebes@gmail.com, SuperaNova
          plugin_languages_analysis_timeout: 60
